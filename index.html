        </div>
        <div style={{ width: 1, height: 28, background: 'var(--border)', margin: '0 6px' }} />
        <div ref={ref} className="obra-switch" data-open={open} onClick={() => setOpen(!open)}>
          <span className="obra-dot" style={{ background: OBRAS[obra].id === 'planura' ? 'var(--brand-yellow)' : 'var(--brand-teal)' }} />
          <div style={{ display: 'flex', flexDirection: 'column', lineHeight: 1.15 }}>
            <span className="obra-name">{OBRAS[obra].nome}</span>
            <span className="obra-meta">{OBRAS[obra].local}</span>
          </div>
          <Icon name="chevron" />
          {open && (
            <div className="obra-menu" onClick={e => e.stopPropagation()}>
              {Object.values(OBRAS).map(o => (
                <div key={o.id} className={`obra-menu-item ${o.id === obra ? 'active' : ''}`}
                  onClick={() => { onObraChange(o.id); setOpen(false); }}>
                  <span className="m-name">{o.nome}</span>
                  <span className="m-meta">{o.local} · {fmtBRLk(o.totais.orc)} orçado</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
      <div className="header-tools">
        <div className="header-ref">Ref. {refDate}</div>
        <button className="btn" onClick={onImport}>
          <Icon name="upload" /> Importar
        </button>
      </div>
    </header>
  );
}

// Export
Object.assign(window, { Icon, Sparkline, Header, fmtBRL, fmtBRLk, fmtK, pct, famColor, FAM_COLORS, OBRAS, MESES_PLANURA, MESES_BOM });

</script>
<script type="text/babel">
/* Charts — Chart.js */
const { useEffect, useRef } = React;

const CHART_DEFAULTS = {
  responsive: true,
  maintainAspectRatio: false,
  interaction: { mode: 'index', intersect: false },
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: '#0a1420',
      borderColor: 'rgba(255,255,255,0.15)',
      borderWidth: 1,
      titleFont: { family: 'Inter', size: 11, weight: 600 },
      bodyFont: { family: 'JetBrains Mono', size: 11 },
      padding: 10,
      cornerRadius: 6,
      callbacks: { label: c => c.dataset.label + ': ' + fmtBRL(c.raw) }
    }
  },
  scales: {
    x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#8ea7bc', font: { size: 10, family: 'JetBrains Mono' } } },
    y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#8ea7bc', font: { size: 10, family: 'JetBrains Mono' }, callback: v => fmtK(v) } }
  }
};

function useChart(canvasRef, config, deps) {
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, config);
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, deps);
}

// --- Monthly FD vs AEVO ---
function ChartMonthly({ cifras, meses }) {
  const ref = useRef(null);
  const fd = meses.map(m => cifras.reduce((s, c) => s + Math.max(0, c.meses[m]?.fd || 0), 0));
  const ae = meses.map(m => cifras.reduce((s, c) => s + Math.max(0, c.meses[m]?.aevo || 0), 0));
  const tot = meses.map((_, i) => fd[i] + ae[i]);

  useChart(ref, {
    type: 'bar',
    data: {
      labels: meses,
      datasets: [
        { label: 'FD (RDObras)', data: fd, backgroundColor: '#4ea6ff', borderRadius: 3, stack: 's', borderSkipped: false },
        { label: 'AEVO (OMIE)', data: ae, backgroundColor: '#f0d020', borderRadius: 3, stack: 's', borderSkipped: false },
        { label: 'Total', type: 'line', data: tot, borderColor: 'rgba(255,255,255,0.3)', borderWidth: 1.5, borderDash: [3,3], pointRadius: 3, pointBackgroundColor: '#fff', fill: false, tension: 0.2 },
      ]
    },
    options: CHART_DEFAULTS
  }, [JSON.stringify(fd), JSON.stringify(ae)]);

  return <canvas ref={ref} />;
}

// --- Accumulated: realizado vs projetado vs orçado ---
function ChartAccum({ cifras, meses, totals, obra }) {
  const ref = useRef(null);
  const o = OBRAS[obra];
  let ar = 0, ap = 0;
  const realAcum = meses.map(m => {
    ar += cifras.reduce((s, c) => s + (c.meses[m]?.fd || 0) + (c.meses[m]?.aevo || 0), 0);
    return Math.round(ar);
  });
  const projAcum = meses.map(m => {
    ap += cifras.reduce((s, c) => s + (c.meses[m]?.proj || 0), 0);
    return Math.round(ap);
  });
  const orc = meses.map(() => totals.orc);
  const teto = meses.map(() => totals.orc + o.contingencia + o.aditivo);

  useChart(ref, {
    type: 'line',
    data: {
      labels: meses,
      datasets: [
        { label: 'Teto contratual', data: teto, borderColor: '#f0d020', borderWidth: 1.5, borderDash: [4,3], pointRadius: 0, fill: false, tension: 0 },
        { label: 'Orçado', data: orc, borderColor: 'rgba(255,255,255,0.22)', borderWidth: 1.5, borderDash: [6,4], pointRadius: 0, fill: false, tension: 0 },
        { label: 'Projetado', data: projAcum, borderColor: '#ff6b6b', backgroundColor: 'rgba(255,107,107,0.08)', borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: '#ff6b6b', fill: true, tension: 0.25 },
        { label: 'Realizado', data: realAcum, borderColor: '#3ec8a0', backgroundColor: 'rgba(62,200,160,0.12)', borderWidth: 3, pointRadius: 4, pointBackgroundColor: '#3ec8a0', fill: true, tension: 0.25 },
      ]
    },
    options: CHART_DEFAULTS
  }, [JSON.stringify(realAcum), JSON.stringify(projAcum), obra]);

  return <canvas ref={ref} />;
}

// --- FD vs AEVO Accumulated ---
function ChartFDAccum({ cifras, meses }) {
  const ref = useRef(null);
  let afd = 0, aae = 0;
  const fd = meses.map(m => { afd += cifras.reduce((s, c) => s + (c.meses[m]?.fd || 0), 0); return Math.round(afd); });
  const ae = meses.map(m => { aae += cifras.reduce((s, c) => s + (c.meses[m]?.aevo || 0), 0); return Math.round(aae); });

  useChart(ref, {
    type: 'line',
    data: {
      labels: meses,
      datasets: [
        { label: 'Real FD (RDObras)', data: fd, borderColor: '#4ea6ff', backgroundColor: 'rgba(78,166,255,0.12)', borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: '#4ea6ff', fill: true, tension: 0.25 },
        { label: 'Real AEVO (OMIE)', data: ae, borderColor: '#f0d020', backgroundColor: 'rgba(240,208,32,0.10)', borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: '#f0d020', fill: true, tension: 0.25 },
      ]
    },
    options: CHART_DEFAULTS
  }, [JSON.stringify(fd), JSON.stringify(ae)]);

  return <canvas ref={ref} />;
}

// --- Deviation chart ---
function ChartDeviation({ cifras }) {
  const ref = useRef(null);
  const top = [...cifras]
    .filter(c => c.orcado > 0)
    .map(c => ({ ...c, dev: c.projetado - c.orcado }))
    .sort((a, b) => Math.abs(b.dev) - Math.abs(a.dev))
    .slice(0, 12);

  useChart(ref, {
    type: 'bar',
    data: {
      labels: top.map(c => c.descricao.length > 32 ? c.descricao.slice(0, 32) + '…' : c.descricao),
      datasets: [{
        data: top.map(c => Math.round(c.dev)),
        backgroundColor: top.map(c => c.dev > 0 ? '#ff6b6b' : '#3ec8a0'),
        borderRadius: 3,
      }]
    },
    options: {
      ...CHART_DEFAULTS,
      indexAxis: 'y',
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#8ea7bc', font: { size: 10, family: 'JetBrains Mono' }, callback: v => fmtK(v) } },
        y: { grid: { display: false }, ticks: { color: '#eaf2f8', font: { size: 10, family: 'Inter' } } }
      }
    }
  }, [JSON.stringify(top)]);

  return <canvas ref={ref} />;
}

Object.assign(window, { ChartMonthly, ChartAccum, ChartFDAccum, ChartDeviation });

</script>
<script type="text/babel">
/* Hero, KPI strip, Alerts, Families */
const { useState, useEffect, useMemo } = React;

// --- Hero: Saldo vs Contrato ---
function Hero({ obra, totals, cifras }) {
  const o = OBRAS[obra];
  const orc = totals.orc;
  const realizado = totals.real;
  const projetado = totals.proj;
  const contingencia = o.contingencia;
  const aditivo = o.aditivo;
  const saldoProj = totals.saldoProj;
  const saldoLiquido = saldoProj + contingencia + aditivo;

  const tetoContrato = orc + contingencia + aditivo;

  // Stack segments as % of tetoContrato
  const seg = v => Math.max(0, (v / tetoContrato) * 100);

  const isBad = saldoLiquido < 0;

  // % de consumo
  const consumoPct = projetado / tetoContrato * 100;

  return (
    <div className="hero">
      <div className="hero-left">
        <div className="hero-eyebrow">
          {isBad && <span className="pulse" />}
          {isBad ? 'Projeção acima do contrato' : 'Folga disponível'} · {o.nome}
        </div>
        <div className="hero-title">Saldo líquido — projetado vs orçado + contingência + aditivo</div>
        <div className={`hero-value ${isBad ? 'bad' : 'good'}`}>
          {(saldoLiquido >= 0 ? '' : '−')} {fmtBRL(Math.abs(saldoLiquido))}
        </div>
        <div className="hero-sub">
          <span>Projetado consome</span>
          <span className={`chip ${consumoPct > 100 ? 'bad' : 'good'}`}>{consumoPct.toFixed(1)}% do teto</span>
          <span>·</span>
          <span>Saldo orçado</span>
          <span className={`chip ${saldoProj >= 0 ? 'good' : 'bad'}`}>
            {saldoProj >= 0 ? '+' : '−'}{fmtBRLk(Math.abs(saldoProj))}
          </span>
        </div>
      </div>

      <div className="budget-stack">
        <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 2 }}>
          Decomposição do teto contratual — {fmtBRLk(tetoContrato)}
        </div>
        <div className="stack-bar">
          <div className="stack-seg realizado" style={{ width: `${seg(realizado)}%` }} title={`Realizado ${fmtBRLk(realizado)}`}>
            {seg(realizado) > 12 ? fmtBRLk(realizado) : ''}
          </div>
          <div className="stack-seg projetado" style={{ width: `${seg(Math.max(0, projetado - realizado))}%` }} title={`A realizar (proj.) ${fmtBRLk(Math.max(0, projetado - realizado))}`}>
            {seg(projetado - realizado) > 12 ? fmtBRLk(projetado - realizado) : ''}
          </div>
          {/* Gap between projetado and orçado */}
          {projetado < orc && (
            <div className="stack-seg gap" style={{ width: `${seg(orc - projetado)}%` }} title={`Folga orçada ${fmtBRLk(orc - projetado)}`}>
              {seg(orc - projetado) > 10 ? 'folga' : ''}
            </div>
          )}
          {/* Overrun zone — if projetado > orc */}
          {projetado > orc && (
            <div className="stack-seg projetado" style={{ width: `${seg(Math.min(projetado - orc, contingencia + aditivo))}%`, background: 'rgba(255,107,107,0.55)' }} title={`Estouro absorvido ${fmtBRLk(Math.min(projetado - orc, contingencia + aditivo))}`} />
          )}
          <div className="stack-seg contingencia" style={{ width: `${seg(contingencia)}%` }} title={`Contingência ${fmtBRLk(contingencia)}`}>
            {seg(contingencia) > 8 ? 'cont.' : ''}
          </div>
          {aditivo > 0 && (
            <div className="stack-seg aditivo" style={{ width: `${seg(aditivo)}%` }} title={`Aditivo ${fmtBRLk(aditivo)}`}>
              {seg(aditivo) > 8 ? 'adit.' : ''}
            </div>
          )}
          {/* Cursor for projetado */}
          <div className="stack-cursor"
            data-label={`proj. ${consumoPct.toFixed(0)}%`}
            style={{ left: `${seg(projetado)}%` }} />
        </div>
        <div className="stack-legend">
          <span className="li"><span className="sw" style={{ background: 'var(--good)' }} />Realizado <b style={{ color: 'var(--text)', marginLeft: 4 }}>{fmtBRLk(realizado)}</b></span>
          <span className="li"><span className="sw" style={{ background: 'rgba(255,107,107,0.85)' }} />Projeção a realizar <b style={{ color: 'var(--text)', marginLeft: 4 }}>{fmtBRLk(Math.max(0, projetado - realizado))}</b></span>
          <span className="li"><span className="sw" style={{ background: 'var(--brand-yellow)' }} />Contingência <b style={{ color: 'var(--text)', marginLeft: 4 }}>{fmtBRLk(contingencia)}</b></span>
          {aditivo > 0 && <span className="li"><span className="sw" style={{ background: 'var(--brand-teal)' }} />Aditivo <b style={{ color: 'var(--text)', marginLeft: 4 }}>{fmtBRLk(aditivo)}</b></span>}
        </div>
      </div>
    </div>
  );
}

// --- KPI strip ---
function KpiStrip({ obra, totals, cifras, monthlyData }) {
  const o = OBRAS[obra];
  const orc = totals.orc;
  const realizado = totals.real;
  const projetado = totals.proj;
  const saldoProj = totals.saldoProj;
  const provTot = cifras.reduce((s, c) => s + (c.prov_tot || 0), 0);

  // Burn rate: média mensal realizada até o mês mais recente com dados
  const realMensal = o.meses.map(m => cifras.reduce((s, c) => s + (c.meses[m]?.fd || 0) + (c.meses[m]?.aevo || 0), 0));
  const mesesAtivos = realMensal.filter(v => v > 0).length || 1;
  const burnRate = realizado / mesesAtivos;

  // Sparkline data
  const sparkRealAcum = (() => { let a = 0; return realMensal.map(v => a += v); })();

  const kpis = [
    {
      label: 'Orçado total',
      val: fmtBRLk(orc),
      sub: `${cifras.length} cifras · ${o.meses.length} meses`,
      color: null,
    },
    {
      label: 'Realizado',
      val: fmtBRLk(realizado),
      sub: <><span>{pct(realizado, orc, 0)} do orçado</span></>,
      spark: sparkRealAcum,
      sparkColor: '#3ec8a0',
    },
    {
      label: 'Projetado',
      val: fmtBRLk(projetado),
      sub: <span className={projetado > orc ? 'delta' : ''} style={{ color: projetado > orc ? 'var(--bad)' : 'var(--good)' }}>
        {projetado > orc ? '▲' : '▼'} {pct(projetado, orc, 0)} do orçado
      </span>,
      accent: projetado > orc ? 'bad' : 'good',
    },
    {
      label: 'Saldo projetado',
      val: (saldoProj >= 0 ? '' : '−') + fmtBRLk(Math.abs(saldoProj)),
      sub: saldoProj >= 0 ? 'disponível' : 'acima do orçamento',
      accent: saldoProj >= 0 ? 'good' : 'bad',
    },
    {
      label: 'Burn-rate mensal',
      val: fmtBRLk(burnRate),
      sub: `média ${mesesAtivos} meses`,
      spark: realMensal,
      sparkColor: '#6aa8ff',
    },
    {
      label: 'Provisionado',
      val: fmtBRLk(provTot),
      sub: `${pct(provTot, orc, 0)} reservado`,
      accent: 'yellow',
    },
  ];

  return (
    <div className="kpi-strip">
      {kpis.map((k, i) => (
        <div key={i} className={`kpi ${k.accent ? 'accent-' + k.accent : ''}`}>
          <div className="k-label">{k.label}</div>
          <div className="k-val">{k.val}</div>
          <div className="k-sub">{k.sub}</div>
          {k.spark && <Sparkline data={k.spark} color={k.sparkColor} />}
        </div>
      ))}
    </div>
  );
}

// --- Alerts panel (cifras estourando) ---
function AlertsPanel({ cifras, onClickCifra }) {
  const alerts = useMemo(() => {
    return cifras
      .filter(c => c.orcado > 0 && c.projetado > c.orcado)
      .map(c => ({ ...c, dev: c.projetado - c.orcado, pctOver: (c.projetado / c.orcado - 1) * 100 }))
      .sort((a, b) => b.dev - a.dev)
      .slice(0, 8);
  }, [cifras]);

  if (!alerts.length) {
    return (
      <div className="panel">
        <div className="panel-head">
          <span className="panel-title">Alertas — cifras estourando</span>
        </div>
        <div style={{ fontSize: 12, color: 'var(--text-muted)', padding: 20, textAlign: 'center' }}>
          Nenhuma cifra projetada acima do orçado.
        </div>
      </div>
    );
  }

  const totalDev = alerts.reduce((s, a) => s + a.dev, 0);

  return (
    <div className="panel alert-panel">
      <div className="panel-head">
        <span className="panel-title">Cifras estourando — top {alerts.length}</span>
        <span className="panel-meta" style={{ color: 'var(--bad)' }}>
          Σ desvio {fmtBRLk(totalDev)}
        </span>
      </div>
      <div className="alert-list">
        {alerts.map((a, i) => (
          <div key={i} className="alert-row" onClick={() => onClickCifra && onClickCifra(a.descricao)}>
            <div className="a-icon">!</div>
            <div className="a-desc" title={a.descricao}>
              <span style={{ color: famColor(a.familia).color, marginRight: 6, fontSize: 10, fontFamily: 'var(--font-mono)' }}>
                {famColor(a.familia).tag}
              </span>
              {a.descricao}
            </div>
            <div className="a-val">+{fmtBRLk(a.dev)}</div>
            <div className="a-pct">+{a.pctOver.toFixed(0)}%</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// --- Family breakdown ---
function FamiliesPanel({ cifras, activeFam, onFamClick }) {
  const fams = useMemo(() => {
    const acc = {};
    cifras.forEach(c => {
      if (!acc[c.familia]) acc[c.familia] = { orcado: 0, real: 0, projetado: 0, count: 0 };
      acc[c.familia].orcado += c.orcado;
      acc[c.familia].real += c.real_total;
      acc[c.familia].projetado += c.projetado;
      acc[c.familia].count += 1;
    });
    return Object.entries(acc).sort((a, b) => b[1].orcado - a[1].orcado);
  }, [cifras]);

  const max = Math.max(...fams.map(([, v]) => Math.max(v.orcado, v.projetado)), 1);

  return (
    <div className="panel">
      <div className="panel-head">
        <span className="panel-title">Quebra por família</span>
        {activeFam && (
          <span className="panel-meta">
            filtrando: <b style={{ color: famColor(activeFam).color }}>{activeFam}</b>
            <button className="btn" style={{ marginLeft: 8, padding: '2px 8px', fontSize: 10 }} onClick={() => onFamClick(null)}>limpar</button>
          </span>
        )}
      </div>
      <div className="fam-list">
        {fams.map(([f, v]) => {
          const fc = famColor(f);
          const over = v.projetado > v.orcado;
          const pctProj = v.projetado / v.orcado * 100;
          const active = activeFam === f;
          return (
            <div key={f} className={`fam-row ${active ? 'active' : ''}`} onClick={() => onFamClick(f === activeFam ? null : f)}>
              <div className="fam-name">
                <span className="fam-dot" style={{ background: fc.color }} />
                {f.charAt(0) + f.slice(1).toLowerCase()}
                <span style={{ fontSize: 9, color: 'var(--text-muted)', fontFamily: 'var(--font-mono)' }}>({v.count})</span>
              </div>
              <div className="fam-track">
                <div className="f-orcado" style={{ width: `${(v.orcado / max) * 100}%` }} />
                <div className="f-real" style={{ width: `${(v.real / max) * 100}%`, background: fc.color, opacity: 0.9 }} />
                <div className="f-marker" style={{ left: `${(v.projetado / max) * 100}%`, background: over ? 'var(--bad)' : 'var(--text)' }} title={`Projetado: ${fmtBRLk(v.projetado)}`} />
              </div>
              <div className="fam-values">
                <div className="v-real">{fmtK(v.real)}</div>
                <div className="v-orc">/ {fmtK(v.orcado)}</div>
              </div>
              <div className={`fam-pct ${over ? 'bad' : 'good'}`}>
                {pctProj.toFixed(0)}%
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 12, fontFamily: 'var(--font-mono)', display: 'flex', gap: 14 }}>
        <span>▓ orçado  ▓ realizado  │ projetado</span>
      </div>
    </div>
  );
}

Object.assign(window, { Hero, KpiStrip, AlertsPanel, FamiliesPanel });

</script>
<script type="text/babel">
/* Cifras Table — sortable, searchable, expandable */
const { useState, useMemo } = React;

function CifrasTable({ cifras, meses, activeFam, onFamFilter }) {
  const [query, setQuery] = useState('');
  const [sortBy, setSortBy] = useState('projetado');
  const [sortDir, setSortDir] = useState('desc');
  const [expanded, setExpanded] = useState(null);
  const [filter, setFilter] = useState('all'); // all | over | under | zero

  const counts = useMemo(() => {
    const byFam = {};
    cifras.forEach(c => { byFam[c.familia] = (byFam[c.familia] || 0) + 1; });
    return byFam;
  }, [cifras]);

  const filtered = useMemo(() => {
    let r = cifras;
    if (activeFam) r = r.filter(c => c.familia === activeFam);
    if (query.trim()) {
      const q = query.trim().toLowerCase();
      r = r.filter(c => c.descricao.toLowerCase().includes(q) || c.familia.toLowerCase().includes(q));
    }
    if (filter === 'over') r = r.filter(c => c.projetado > c.orcado && c.orcado > 0);
    else if (filter === 'under') r = r.filter(c => c.projetado <= c.orcado);
    else if (filter === 'zero') r = r.filter(c => c.real_total === 0);

    const sign = sortDir === 'asc' ? 1 : -1;
    r = [...r].sort((a, b) => {
      const av = a[sortBy] ?? 0;
      const bv = b[sortBy] ?? 0;
      if (typeof av === 'string') return sign * av.localeCompare(bv);
      return sign * (av - bv);
    });
    return r;
  }, [cifras, query, sortBy, sortDir, filter, activeFam]);

  const toggleSort = key => {
    if (sortBy === key) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
    else { setSortBy(key); setSortDir('desc'); }
  };

  const totals = useMemo(() => {
    const t = { orcado: 0, real_fd: 0, real_aevo: 0, real_prov: 0, prov_tot: 0, real_total: 0, projetado: 0, saldo: 0, saldo_proj: 0 };
    filtered.forEach(c => {
      t.orcado += c.orcado; t.real_fd += c.real_fd; t.real_aevo += c.real_aevo;
      t.real_prov += (c.real_prov || 0); t.prov_tot += (c.prov_tot || 0);
      t.real_total += c.real_total; t.projetado += c.projetado; t.saldo += c.saldo;
      t.saldo_proj += (c.saldo_proj || 0);
    });
    return t;
  }, [filtered]);

  const cols = [
    { key: 'descricao', label: 'Cifra', align: 'left' },
    { key: 'orcado', label: 'Orçado', dim: true },
    { key: 'real_fd', label: 'FD' },
    { key: 'real_aevo', label: 'AEVO' },
    { key: 'real_total', label: 'Total real' },
    { key: 'saldo', label: 'Saldo', semantic: 'saldo' },
    { key: 'prov_tot', label: 'Prov.', dim: true },
    { key: 'projetado', label: 'Projetado', semantic: 'proj' },
    { key: 'saldo_proj', label: 'Saldo proj.', semantic: 'saldoProj' },
    { key: 'pct', label: '%' },
  ];

  return (
    <div className="panel">
      <div className="panel-head">
        <span className="panel-title">Detalhamento por cifra</span>
        <span className="panel-meta">{filtered.length} de {cifras.length} cifras</span>
      </div>

      <div className="table-controls">
        <div className="search-box">
          <Icon name="search" />
          <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Buscar cifra ou família..." />
        </div>
        <div className="filter-chips">
          <span className={`chip ${filter === 'all' ? 'on' : ''}`} onClick={() => setFilter('all')}>
            Todas <span className="chip-count">{cifras.length}</span>
          </span>
          <span className={`chip ${filter === 'over' ? 'on' : ''}`} onClick={() => setFilter('over')}>
            <span className="chip-dot" style={{ background: 'var(--bad)' }} /> Estourando
          </span>
          <span className={`chip ${filter === 'under' ? 'on' : ''}`} onClick={() => setFilter('under')}>
            <span className="chip-dot" style={{ background: 'var(--good)' }} /> Dentro
          </span>
          <span className={`chip ${filter === 'zero' ? 'on' : ''}`} onClick={() => setFilter('zero')}>
            Sem realizado
          </span>
          {Object.entries(FAM_COLORS).map(([f, fc]) => (
            <span key={f} className={`chip ${activeFam === f ? 'on' : ''}`}
              style={activeFam === f ? { borderColor: fc.color, color: fc.color } : {}}
              onClick={() => onFamFilter(activeFam === f ? null : f)}>
              <span className="chip-dot" style={{ background: fc.color }} />
              {fc.tag} <span className="chip-count">{counts[f] || 0}</span>
            </span>
          ))}
        </div>
      </div>

      <div className="table-wrap">
        <table className="cifras-table">
          <thead>
            <tr>
              {cols.map(c => (
                <th key={c.key} className={sortBy === c.key ? 'sorted' : ''} onClick={() => toggleSort(c.key)} style={c.align === 'left' ? { textAlign: 'left' } : {}}>
                  {c.label}
                  <span className="sort-ind">{sortBy === c.key ? (sortDir === 'asc' ? '↑' : '↓') : '↕'}</span>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((c, i) => {
              const fc = famColor(c.familia);
              const isExp = expanded === (c.descricao + c.familia);
              const over = c.projetado > c.orcado && c.orcado > 0;
              const pctProj = c.orcado ? (c.projetado / c.orcado * 100).toFixed(0) + '%' : '—';
              return (
                <React.Fragment key={i}>
                  <tr className={isExp ? 'expanded' : ''} onClick={() => setExpanded(isExp ? null : c.descricao + c.familia)}>
                    <td>
                      <div className="cifra-name">
                        <span className="caret-ex">▸</span>
                        <span className="fam-tag" style={{ color: fc.color, background: fc.bg }}>{fc.tag}</span>
                        <span title={c.descricao}>{c.descricao}</span>
                      </div>
                    </td>
                    <td className="dim">{c.orcado ? fmtK(c.orcado) : '—'}</td>
                    <td>{c.real_fd ? fmtK(c.real_fd) : '—'}</td>
                    <td>{c.real_aevo ? fmtK(c.real_aevo) : '—'}</td>
                    <td>{fmtK(c.real_total)}</td>
                    <td className={c.saldo >= 0 ? 'good' : 'bad'}>{c.saldo >= 0 ? '+' : ''}{fmtK(c.saldo)}</td>
                    <td className="dim">{c.prov_tot ? fmtK(c.prov_tot) : '—'}</td>
                    <td className={over ? 'bad' : ''}>{fmtK(c.projetado)}</td>
                    <td className={(c.saldo_proj || 0) >= 0 ? 'good' : 'bad'}>
                      {(c.saldo_proj || 0) >= 0 ? '+' : ''}{fmtK(c.saldo_proj || 0)}
                    </td>
                    <td className={over ? 'bad' : 'dim'}>{pctProj}</td>
                  </tr>
                  {isExp && (
                    <tr className="expanded">
                      <td className="cifra-detail" colSpan={cols.length}>
                        <div className="cifra-detail-inner">
                          <div>
                            <div style={{ fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 8 }}>
                              Breakdown mensal · FD · AEVO · projetado
                            </div>
                            <div className="cifra-months">
                              {meses.map(m => {
                                const md = c.meses[m] || {};
                                const fd = md.fd || 0, ae = md.aevo || 0, pj = md.proj || 0;
                                const total = fd + ae;
                                return (
                                  <div key={m} className="cifra-month">
                                    <div className="m-name">{m}</div>
                                    <div className="m-fd">{fd ? fmtK(fd) : '—'}</div>
                                    <div className="m-ae">{ae ? fmtK(ae) : '—'}</div>
                                    <div className="m-total">{total ? fmtK(total) : '—'}</div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                          <div>
                            <div style={{ fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 8 }}>
                              Resumo financeiro
                            </div>
                            <div className="cifra-meta-list">
                              <div className="cifra-meta-row"><span className="k">Orçado</span><span className="v">{fmtBRL(c.orcado)}</span></div>
                              <div className="cifra-meta-row"><span className="k">Realizado FD</span><span className="v" style={{ color: 'var(--info)' }}>{fmtBRL(c.real_fd)}</span></div>
                              <div className="cifra-meta-row"><span className="k">Realizado AEVO</span><span className="v" style={{ color: 'var(--brand-yellow)' }}>{fmtBRL(c.real_aevo)}</span></div>
                              <div className="cifra-meta-row"><span className="k">Provisionado</span><span className="v">{fmtBRL(c.prov_tot || 0)}</span></div>
                              <div className="cifra-meta-row"><span className="k">Projetado</span><span className="v" style={{ color: over ? 'var(--bad)' : 'var(--text)' }}>{fmtBRL(c.projetado)}</span></div>
                              <div className="cifra-meta-row">
                                <span className="k">Saldo projetado</span>
                                <span className="v" style={{ color: (c.saldo_proj || 0) >= 0 ? 'var(--good)' : 'var(--bad)' }}>
                                  {(c.saldo_proj || 0) >= 0 ? '+' : ''}{fmtBRL(c.saldo_proj || 0)}
                                </span>
                              </div>
                            </div>
                          </div>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
            <tr style={{ borderTop: '2px solid var(--brand-yellow)', background: 'var(--bg-elev)', fontWeight: 700 }}>
              <td style={{ fontFamily: 'var(--font-display)', color: 'var(--brand-yellow)', fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase' }}>Total geral</td>
              <td className="dim">{fmtK(totals.orcado)}</td>
              <td>{fmtK(totals.real_fd)}</td>
              <td>{fmtK(totals.real_aevo)}</td>
              <td>{fmtK(totals.real_total)}</td>
              <td className={totals.saldo >= 0 ? 'good' : 'bad'}>{totals.saldo >= 0 ? '+' : ''}{fmtK(totals.saldo)}</td>
              <td className="dim">{fmtK(totals.prov_tot)}</td>
              <td className={totals.projetado > totals.orcado ? 'bad' : ''}>{fmtK(totals.projetado)}</td>
              <td className={totals.saldo_proj >= 0 ? 'good' : 'bad'}>
                {totals.saldo_proj >= 0 ? '+' : ''}{fmtK(totals.saldo_proj)}
              </td>
              <td>—</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

Object.assign(window, { CifrasTable });

</script>
<script type="text/babel">

/* App root — with real import + localStorage */
const { useState, useEffect, useMemo, useRef } = React;

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "normal",
  "accent": "yellow", 
  "theme": "dark",
  "showAlerts": true,
  "heroStyle": "stack",
  "compactSparklines": true
}/*EDITMODE-END*/;

function ImportModal({ onClose, currentObra, onDataLoaded }) {
  const [status, setStatus] = React.useState('');
  const [filename, setFilename] = React.useState('');
  const [importObra, setImportObra] = React.useState(currentObra);
  const fileRef = React.useRef(null);

  const handle = file => {
    if (!/\.(xlsx|xlsm|xls)$/i.test(file.name)) {
      setStatus('⚠ Formato inválido. Use .xlsx ou .xlsm'); return;
    }
    setFilename(file.name);
    setStatus('⏳ Lendo ' + file.name + '...');
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array', cellDates:true });
        const abasPossiveis = ['P&R - TABELA','PXR_ABC ','PXR_ABC','PXR'];
        const relPossiveis  = ['P&R - RELATÓRIO','PXR_RELATORIO'];
        const abaName = abasPossiveis.find(a => wb.Sheets[a]);
        if (!abaName) { setStatus('⚠ Aba não encontrada. Abas: '+wb.SheetNames.join(', ')); return; }
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[abaName], {header:1,defval:'',raw:true});
        const cifras = csvToCifras(rows);
        if (!cifras.length) { setStatus('⚠ Nenhuma cifra encontrada.'); return; }
        let totais = calcTotais(cifras);
        const relName = relPossiveis.find(a => wb.Sheets[a]);
        if (relName) {
          const rr = XLSX.utils.sheet_to_json(wb.Sheets[relName], {header:1,defval:'',raw:true});
          for (const row of rr) {
            if ((row[1]||'').toString().trim()==='Total Geral') {
              const sr = cifras.reduce((s,c)=>s+c.real_total,0);
              if (Math.abs(n(row[3])-sr)/(sr||1)<0.05) {
                totais={orc:n(row[2]),real:n(row[3]),saldo:n(row[4]),prov:n(row[5]),proj:n(row[6]),saldoProj:n(row[7])};
              } else {
                totais={orc:n(row[2]),real:sr,saldo:n(row[2])-sr,
                        prov:cifras.reduce((s,c)=>s+(c.prov_tot||0),0),proj:n(row[3]),saldoProj:n(row[4])};
              }
              break;
            }
          }
        }
        saveToStorage(importObra, cifras, totais);
        onDataLoaded(importObra, cifras, totais);
        setStatus('✓ '+cifras.length+' cifras importadas!');
        setTimeout(onClose, 1800);
      } catch(err) { setStatus('⚠ Erro: '+err.message); }
    };
    reader.readAsArrayBuffer(file);
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3>Importar dados do Excel</h3>
          <button className="btn" onClick={onClose} style={{padding:4,border:'none'}}><Icon name="x" size={14}/></button>
        </div>
        <div>
          <div style={{fontSize:10,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8}}>Obra destino</div>
          <div style={{display:'flex',gap:8}}>
            {Object.values(OBRAS).map(o=>(
              <button key={o.id} className={`btn ${importObra===o.id?'primary':''}`}
                onClick={()=>setImportObra(o.id)}>{o.nome}</button>
            ))}
          </div>
        </div>
        <div className="dropzone"
          onClick={()=>fileRef.current?.click()}
          onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('hover');}}
          onDragLeave={e=>e.currentTarget.classList.remove('hover')}
          onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove('hover');const f=e.dataTransfer.files[0];if(f)handle(f);}}>
          <input ref={fileRef} type="file" accept=".xlsx,.xlsm,.xls" style={{display:'none'}}
            onChange={e=>{const f=e.target.files[0];if(f)handle(f);e.target.value='';}}/>
          <div className="dropzone-ico">📊</div>
          <div className="dropzone-text">Arraste o Excel aqui ou clique para selecionar</div>
          <div className="dropzone-hint">Aba <b style={{color:'var(--brand-yellow)'}}>P&amp;R - TABELA</b> ou <b style={{color:'var(--brand-yellow)'}}>PXR_ABC</b> detectada automaticamente</div>
          {filename && <div style={{fontSize:11,color:'var(--brand-yellow)',marginTop:10,fontFamily:'var(--font-mono)'}}>{filename}</div>}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <button className="btn" style={{fontSize:11,color:'var(--bad)',borderColor:'rgba(255,107,107,0.3)'}}
            onClick={()=>{limparTodos();}}>🗑 Limpar dados importados</button>
          <div style={{fontSize:12,color:status.includes('✓')?'var(--good)':status.includes('⚠')?'var(--bad)':'var(--text-dim)'}}>
            {status}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = useTweaks(DEFAULTS);
  const [obra, setObra] = useState('planura');
  const [activeFam, setActiveFam] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [localData, setLocalData] = useState({});

  // Load from localStorage on init
  useEffect(() => {
    const ld = {};
    ['planura','bom'].forEach(id => {
      const saved = loadFromStorage(id);
      if (saved) { ld[id] = saved; OBRAS[id].cifras = saved.cifras; OBRAS[id].totais = saved.totais; }
    });
    setLocalData(ld);
    // Show banner if any imported data
    const banner = document.getElementById('importBanner');
    const bannerRef = document.getElementById('importBannerRef');
    if (banner && Object.keys(ld).length > 0) {
      banner.style.display = 'flex';
      if (bannerRef) {
        const refs = Object.entries(ld).map(([id,d])=>OBRAS[id].nome+(d.ref?' ('+d.ref+')':'')).join(' · ');
        bannerRef.textContent = refs;
      }
    }
  }, []);

  useEffect(() => {
    document.documentElement.setAttribute('data-density', tweaks.density);
    document.documentElement.setAttribute('data-accent', tweaks.accent);
    document.documentElement.setAttribute('data-theme', tweaks.theme);
  }, [tweaks]);

  const o = OBRAS[obra];
  const cifras = o.cifras || [];
  const totals = o.totais || {};

  const scrollToCifra = () => {
    document.querySelector('.cifras-table')?.scrollIntoView({behavior:'smooth',block:'start'});
  };

  const handleDataLoaded = (id, cifras, totais) => {
    OBRAS[id].cifras = cifras;
    OBRAS[id].totais = totais;
    setLocalData(prev => ({...prev, [id]:{cifras,totais}}));
    const banner = document.getElementById('importBanner');
    if (banner) banner.style.display = 'flex';
  };

  return (
    <>
      <Header obra={obra} onObraChange={setObra} onImport={()=>setShowImport(true)} refDate={(() => {
      const d = new Date();
      const dow = d.getDay(); // 0=dom..6=sab
      const diff = dow >= 5 ? dow - 5 : dow + 2; // dias desde última sexta
      d.setDate(d.getDate() - diff);
      return 'Semana de ' + d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
    })()}/>
      <main className="main">
        <Hero obra={obra} totals={totals} cifras={cifras}/>
        <KpiStrip obra={obra} totals={totals} cifras={cifras}/>
        {tweaks.showAlerts && (
          <div className="grid-3-2">
            <div style={{
              background:'var(--bg-panel)', border:'1px solid var(--border)',
              borderRadius:'var(--radius-l)', overflow:'hidden',
              display:'flex', flexDirection:'column'
            }}>
              <div className="panel-head" style={{padding:'14px 16px 10px', marginBottom:0, flexShrink:0}}>
                <span className="panel-title">Realizado mensal — FD (RDObras) vs AEVO (OMIE)</span>
                <div className="legend">
                  <span className="li"><span className="sw" style={{background:'#4ea6ff'}}/>FD</span>
                  <span className="li"><span className="sw" style={{background:'#f0d020'}}/>AEVO</span>
                  <span className="li"><span className="sw" style={{background:'rgba(255,255,255,0.3)'}}/>Total</span>
                </div>
              </div>
              <div style={{flex:1, minHeight:240, display:'flex', flexDirection:'column'}}>
                <ChartMonthly cifras={cifras} meses={o.meses}/>
              </div>
            </div>
            <AlertsPanel cifras={cifras} onClickCifra={scrollToCifra}/>
          </div>
        )}
        <div className="panel" style={{paddingBottom:0}}>
          <div className="panel-head">
            <span className="panel-title">Acumulado no tempo — realizado vs projetado vs orçado</span>
            <div className="legend">
              <span className="li"><span className="sw" style={{background:'#3ec8a0'}}/>Realizado</span>
              <span className="li"><span className="sw" style={{background:'#ff6b6b'}}/>Projetado</span>
              <span className="li"><span className="sw" style={{background:'rgba(255,255,255,0.2)'}}/>Orçado</span>
              <span className="li"><span className="sw" style={{background:'#f0d020',opacity:0.7}}/>Teto contratual</span>
            </div>
          </div>
          <div className="chart-wrap" style={{height:260}}><ChartAccum cifras={cifras} meses={o.meses} totals={totals} obra={obra}/></div>
        </div>
        <div className="grid-2">
          <div className="panel" style={{paddingBottom:0}}>
            <div className="panel-head">
              <span className="panel-title">Faturamento acumulado — FD vs AEVO</span>
            </div>
            <div className="chart-wrap"><ChartFDAccum cifras={cifras} meses={o.meses}/></div>
          </div>
          <FamiliesPanel cifras={cifras} activeFam={activeFam} onFamClick={setActiveFam}/>
        </div>
        <div className="panel" style={{paddingBottom:0}}>
          <div className="panel-head">
            <span className="panel-title">Desvio projetado vs orçado</span>
            <span className="panel-meta">vermelho = estouro · verde = economia</span>
          </div>
          <div className="chart-wrap" style={{height:320}}><ChartDeviation cifras={cifras}/></div>
        </div>
        <CifrasTable cifras={cifras} meses={o.meses} activeFam={activeFam} onFamFilter={setActiveFam}/>
        <div style={{textAlign:'center',fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)',padding:'20px 0'}}>
          AEVO ENERGIA · P&amp;R EPC · Dados ref. ABR/2026 · {cifras.length} cifras · {o.meses.length} meses acompanhados
        </div>
      </main>
      {showImport && <ImportModal onClose={()=>setShowImport(false)} currentObra={obra} onDataLoaded={handleDataLoaded}/>}
      <TweaksPanel title="Tweaks">
        <TweakSection title="Aparência">
          <TweakRadio label="Densidade" value={tweaks.density}
            options={[{value:'compact',label:'Compacta'},{value:'normal',label:'Normal'},{value:'spacious',label:'Arejada'}]}
            onChange={v=>setTweaks({density:v})}/>
          <TweakRadio label="Cor de destaque" value={tweaks.accent}
            options={[{value:'yellow',label:'Amarelo AEVO'},{value:'teal',label:'Teal'},{value:'amber',label:'Âmbar'},{value:'green',label:'Verde'}]}
            onChange={v=>setTweaks({accent:v})}/>
          <TweakRadio label="Tema" value={tweaks.theme}
            options={[{value:'dark',label:'Escuro'},{value:'light',label:'Claro'}]}
            onChange={v=>setTweaks({theme:v})}/>
        </TweakSection>
        <TweakSection title="Conteúdo">
          <TweakToggle label="Painel de alertas" value={tweaks.showAlerts} onChange={v=>setTweaks({showAlerts:v})}/>
          <TweakToggle label="Sparklines nos KPIs" value={tweaks.compactSparklines} onChange={v=>setTweaks({compactSparklines:v})}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err){
      return <div style={{color:'#f87171',padding:30,fontFamily:'monospace',background:'#0a1420',minHeight:'100vh',fontSize:13}}>
        <b>ERRO REACT:</b><br/><pre>{this.state.err.toString()}</pre>
        <pre style={{fontSize:11,color:'#888'}}>{this.state.err.stack}</pre>
      </div>;
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);


</script>

</body>
</html>
