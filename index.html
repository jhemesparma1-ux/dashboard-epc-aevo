<!DOCTYPE html>
<html lang="pt-BR" data-density="normal" data-accent="yellow" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEVO Energia · Dashboard P&R EPC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Palette — dark engineering, derived from AEVO logo */
  --bg: #0a1420;
  --bg-panel: #111e2d;
  --bg-panel-2: #17263a;
  --bg-elev: #1d2f46;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.16);
  --text: #eaf2f8;
  --text-dim: #8ea7bc;
  --text-muted: #5d7790;

  /* Brand */
  --brand-yellow: #f0d020;
  --brand-teal: #1a8fa6;
  --brand-deep: #0d4d66;

  /* Semantic */
  --good: #3ec8a0;
  --bad: #ff6b6b;
  --warn: #f0a040;
  --info: #4ea6ff;

  /* Typography */
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'DM Mono', ui-monospace, monospace;
  --font-display: 'Space Grotesk', 'Inter', sans-serif;

  /* Scale */
  --radius-s: 4px;
  --radius-m: 8px;
  --radius-l: 12px;

  /* Density (tweakable) */
  --dens-pad: 16px;
  --dens-gap: 14px;
  --dens-kpi-pad: 14px 16px;
  --dens-text-kpi: 22px;
  --dens-text-hero: 56px;
}

[data-density="compact"] {
  --dens-pad: 12px;
  --dens-gap: 10px;
  --dens-kpi-pad: 10px 12px;
  --dens-text-kpi: 18px;
  --dens-text-hero: 44px;
}
[data-density="spacious"] {
  --dens-pad: 22px;
  --dens-gap: 20px;
  --dens-kpi-pad: 18px 22px;
  --dens-text-kpi: 26px;
  --dens-text-hero: 68px;
}

[data-theme="light"] {
  --bg: #f5f7fa;
  --bg-panel: #ffffff;
  --bg-panel-2: #fafbfd;
  --bg-elev: #f0f3f7;
  --border: rgba(13,77,102,0.10);
  --border-strong: rgba(13,77,102,0.20);
  --text: #0a1420;
  --text-dim: #45627a;
  --text-muted: #6e8699;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; }

/* === Header === */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.brand { display: flex; align-items: center; gap: 14px; }
.brand-logo {
  width: 44px; height: 44px; border-radius: 0;
  background: transparent; display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.brand-logo img { width: 100%; height: 100%; object-fit: contain; }
.brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-text .name { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
.brand-text .sub { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; }

.header-tools { display: flex; align-items: center; gap: 12px; }
.header-ref {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
}

/* === Obra selector (inline dropdown-style) === */
.obra-switch {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px 6px 14px;
  background: var(--bg-elev); border: 1px solid var(--border-strong);
  border-radius: 10px; cursor: pointer; position: relative;
  font-family: var(--font-sans);
}
.obra-switch .obra-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand-yellow); }
.obra-switch .obra-name { font-weight: 600; font-size: 13px; }
.obra-switch .obra-meta { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
.obra-switch .caret { color: var(--text-muted); transition: transform 0.2s; }
.obra-switch[data-open="true"] .caret { transform: rotate(180deg); }

.obra-menu {
  position: absolute; top: calc(100% + 6px); left: 0; min-width: 100%;
  background: var(--bg-panel); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 6px; display: flex; flex-direction: column; gap: 2px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  z-index: 100;
}
.obra-menu-item {
  padding: 10px 14px; border-radius: 6px; cursor: pointer;
  display: flex; flex-direction: column; gap: 2px;
  min-width: 220px;
}
.obra-menu-item:hover { background: var(--bg-elev); }
.obra-menu-item.active { background: var(--bg-elev); }
.obra-menu-item .m-name { font-size: 13px; font-weight: 600; }
.obra-menu-item .m-meta { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 7px;
  background: transparent; border: 1px solid var(--border-strong);
  color: var(--text-dim); font-family: var(--font-sans); font-size: 12px;
  cursor: pointer; transition: all 0.15s;
}
.btn:hover { border-color: var(--brand-yellow); color: var(--brand-yellow); }
.btn.primary { background: var(--brand-yellow); border-color: var(--brand-yellow); color: #0a1420; font-weight: 600; }
.btn.primary:hover { filter: brightness(1.1); }
.btn.ghost-bad { border-color: rgba(255,107,107,0.3); color: var(--bad); }
.btn.ghost-bad:hover { border-color: var(--bad); background: rgba(255,107,107,0.08); }

/* === Main === */
.main {
  padding: var(--dens-pad) 28px 60px;
  display: flex; flex-direction: column; gap: var(--dens-gap);
  max-width: 1600px; margin: 0 auto;
}

/* === Hero — Saldo vs Contrato === */
.hero {
  display: grid;
  grid-template-columns: minmax(380px, 1.3fr) 1fr;
  gap: var(--dens-gap);
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-l);
  padding: 22px 24px;
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--brand-teal), var(--brand-yellow));
}
.hero-left { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.hero-eyebrow {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--text-muted); display: flex; align-items: center; gap: 8px;
}
.hero-eyebrow .pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--bad);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.hero-title {
  font-family: var(--font-display);
  font-size: 13px; color: var(--text-dim);
  font-weight: 500;
  margin-top: 2px;
}
.hero-value {
  font-family: var(--font-mono);
  font-size: var(--dens-text-hero);
  font-weight: 700;
  letter-spacing: -0.035em;
  line-height: 1; margin-top: 4px;
  font-variant-numeric: tabular-nums;
}
.hero-value.bad { color: var(--bad); }
.hero-value.good { color: var(--good); }
.hero-sub {
  font-size: 12px; color: var(--text-dim); margin-top: 10px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.hero-sub .chip {
  padding: 3px 8px; border-radius: 4px; font-family: var(--font-mono); font-size: 11px;
  background: var(--bg-elev); border: 1px solid var(--border);
}
.hero-sub .chip.bad { color: var(--bad); border-color: rgba(255,107,107,0.25); }
.hero-sub .chip.good { color: var(--good); border-color: rgba(62,200,160,0.25); }

/* Budget stack — visual breakdown of orçado + contingência + aditivo */
.budget-stack { display: flex; flex-direction: column; gap: 10px; justify-content: center; }
.stack-bar {
  display: flex; height: 34px; border-radius: 6px; overflow: hidden;
  background: var(--bg-elev); border: 1px solid var(--border);
  position: relative;
}
.stack-seg {
  display: flex; align-items: center; justify-content: flex-start;
  padding: 0 10px; font-size: 10px; font-family: var(--font-mono); font-weight: 600;
  min-width: 0; overflow: hidden; white-space: nowrap;
  color: rgba(10,20,32,0.9);
}
.stack-seg.realizado { background: var(--good); }
.stack-seg.projetado { background: rgba(255,107,107,0.85); color: #fff; }
.stack-seg.contingencia { background: var(--brand-yellow); }
.stack-seg.aditivo { background: var(--brand-teal); color: #fff; }
.stack-seg.gap { background: var(--bg-elev); color: var(--text-muted); }
.stack-cursor {
  position: absolute; top: -4px; bottom: -4px; width: 2px;
  background: var(--text);
}
.stack-cursor::after {
  content: attr(data-label);
  position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
  font-size: 9px; font-family: var(--font-mono); color: var(--text);
  white-space: nowrap;
}

.stack-legend {
  display: flex; flex-wrap: wrap; gap: 12px; font-size: 10px;
  font-family: var(--font-mono); color: var(--text-dim);
}
.stack-legend .li { display: flex; align-items: center; gap: 6px; }
.stack-legend .sw { width: 10px; height: 10px; border-radius: 2px; }

/* === KPI strip === */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: var(--dens-gap);
}
.kpi {
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius-m); padding: var(--dens-kpi-pad);
  display: flex; flex-direction: column; gap: 4px;
  min-width: 0;
  position: relative;
  transition: border-color 0.15s;
}
.kpi:hover { border-color: var(--border-strong); }
.kpi .k-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-muted); font-weight: 500;
}
.kpi .k-val {
  font-family: var(--font-mono); font-size: var(--dens-text-kpi);
  font-weight: 700; letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}
.kpi .k-sub {
  font-size: 10px; color: var(--text-dim); font-family: var(--font-mono);
  display: flex; align-items: center; gap: 6px;
}
.kpi .k-sub .delta { font-weight: 600; }
.kpi.accent-bad .k-val { color: var(--bad); }
.kpi.accent-good .k-val { color: var(--good); }
.kpi.accent-yellow .k-val { color: var(--brand-yellow); }

.kpi-spark {
  position: absolute; right: 10px; top: 10px;
  width: 56px; height: 18px; opacity: 0.7;
}

/* === Panels === */
.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-l);
  padding: 18px 20px 14px;
  min-width: 0;
}
.panel:has(.chart-wrap:last-child) {
  padding-bottom: 0;
}
.panel.alert-panel {
  border-color: rgba(255,107,107,0.25);
  background: linear-gradient(180deg, rgba(255,107,107,0.04), transparent 60%), var(--bg-panel);
}
.panel-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; gap: 10px;
}
.panel-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--text-dim); font-weight: 600;
}
.panel-meta { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

/* === Grid layouts === */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--dens-gap); }
.grid-3-2 { display: grid; grid-template-columns: 2fr 1fr; gap: var(--dens-gap); }

/* === Legend === */
.legend { display: flex; gap: 16px; font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }
.legend .li { display: flex; align-items: center; gap: 6px; }
.legend .sw { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

/* === Alerts === */
.alert-list { display: flex; flex-direction: column; gap: 6px; }
.alert-row {
  display: grid;
  grid-template-columns: 22px 1fr auto auto;
  gap: 10px; align-items: center;
  padding: 8px 10px;
  border-radius: 6px;
  background: rgba(255,107,107,0.06);
  border: 1px solid rgba(255,107,107,0.15);
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.alert-row:hover { background: rgba(255,107,107,0.10); }
.alert-row .a-icon {
  color: var(--bad); font-weight: 700;
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(255,107,107,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
}
.alert-row .a-desc { font-weight: 500; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.alert-row .a-val {
  font-family: var(--font-mono); font-size: 11px; color: var(--bad);
  font-variant-numeric: tabular-nums;
}
.alert-row .a-pct {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
  padding: 2px 6px; border-radius: 3px; background: rgba(255,107,107,0.1);
}

/* === Families === */
.fam-list { display: flex; flex-direction: column; gap: 12px; }
.fam-row {
  display: grid;
  grid-template-columns: 110px 1fr 100px 50px;
  gap: 10px; align-items: center;
  cursor: pointer; padding: 4px; border-radius: 4px;
  transition: background 0.15s;
}
.fam-row:hover { background: var(--bg-elev); }
.fam-row.active { background: var(--bg-elev); outline: 1px solid var(--border-strong); }
.fam-name { font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.fam-dot { width: 8px; height: 8px; border-radius: 2px; }
.fam-track {
  position: relative; height: 10px; background: var(--bg-elev);
  border-radius: 2px; overflow: hidden;
}
.fam-track .f-orcado {
  position: absolute; inset: 0 auto 0 0;
  background: var(--border-strong); border-radius: 2px;
}
.fam-track .f-real {
  position: absolute; top: 0; bottom: 0; left: 0;
  border-radius: 2px;
}
.fam-track .f-marker {
  position: absolute; top: -2px; bottom: -2px; width: 2px;
  background: var(--text);
}
.fam-values {
  font-family: var(--font-mono); font-size: 10px; text-align: right;
  font-variant-numeric: tabular-nums;
}
.fam-values .v-real { color: var(--text); font-weight: 600; }
.fam-values .v-orc { color: var(--text-muted); }
.fam-pct { font-family: var(--font-mono); font-size: 11px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
.fam-pct.bad { color: var(--bad); }
.fam-pct.good { color: var(--good); }
.fam-pct.neutral { color: var(--text-dim); }

/* === Chart wrap === */
.chart-wrap { position: relative; height: 220px; margin-bottom: 0; overflow: hidden; }
.chart-wrap canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }
.panel > .chart-wrap:last-child { margin-bottom: -4px; }
.chart-wrap.tall { height: 260px; }

/* === Cifras table === */
.table-controls {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  flex-wrap: wrap;
}
.search-box {
  flex: 1; min-width: 200px; max-width: 320px;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: 6px;
}
.search-box input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: var(--font-sans); font-size: 12px;
}
.search-box input::placeholder { color: var(--text-muted); }
.search-box svg { color: var(--text-muted); flex-shrink: 0; }

.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  padding: 5px 10px; border-radius: 14px; font-size: 11px;
  background: transparent; border: 1px solid var(--border-strong);
  color: var(--text-dim); cursor: pointer; transition: all 0.15s;
  font-family: var(--font-sans);
  display: flex; align-items: center; gap: 6px;
}
.chip:hover { border-color: var(--brand-yellow); color: var(--brand-yellow); }
.chip.on {
  background: var(--bg-elev); color: var(--text);
  border-color: var(--border-strong);
  font-weight: 600;
}
.chip .chip-dot { width: 6px; height: 6px; border-radius: 50%; }
.chip .chip-count {
  background: rgba(255,255,255,0.1); padding: 1px 6px; border-radius: 8px;
  font-family: var(--font-mono); font-size: 9px;
}

.cifras-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.cifras-table th {
  text-align: right; padding: 8px; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-muted); border-bottom: 1px solid var(--border);
  font-weight: 500;
  position: sticky; top: 0; background: var(--bg-panel);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
.cifras-table th:first-child { text-align: left; padding-left: 4px; }
.cifras-table th:hover { color: var(--text); }
.cifras-table th .sort-ind { font-size: 9px; margin-left: 4px; opacity: 0.5; }
.cifras-table th.sorted .sort-ind { opacity: 1; color: var(--brand-yellow); }

.cifras-table tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.cifras-table tbody tr:hover { background: var(--bg-elev); }
.cifras-table tbody tr.expanded { background: var(--bg-elev); }
.cifras-table td {
  padding: 8px; font-family: var(--font-mono); font-size: 11px;
  font-variant-numeric: tabular-nums;
  text-align: right;
  white-space: nowrap;
}
.cifras-table td:first-child {
  text-align: left; font-family: var(--font-sans);
  padding-left: 4px;
  max-width: 280px; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer;
}
.cifras-table td.dim { color: var(--text-muted); }
.cifras-table td.good { color: var(--good); }
.cifras-table td.bad { color: var(--bad); }

.fam-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 1px 6px; border-radius: 3px;
  font-size: 9px; text-transform: uppercase;
  font-family: var(--font-mono);
  font-weight: 600; letter-spacing: 0.05em;
  margin-right: 8px;
}

.cifra-name {
  display: flex; align-items: center; gap: 4px;
  min-width: 0;
}
.cifra-name .caret-ex {
  color: var(--text-muted); font-size: 10px;
  transition: transform 0.15s;
  width: 12px; flex-shrink: 0;
}
tr.expanded .caret-ex { transform: rotate(90deg); color: var(--brand-yellow); }

.cifra-detail {
  padding: 0 !important;
}
.cifra-detail-inner {
  padding: 14px 16px 18px 24px;
  background: rgba(0,0,0,0.18);
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
}
.cifra-months {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(64px, 1fr));
  gap: 8px;
}
.cifra-month {
  background: var(--bg-panel-2); border: 1px solid var(--border);
  border-radius: 4px; padding: 8px 6px;
  display: flex; flex-direction: column; gap: 3px;
  text-align: center;
}
.cifra-month .m-name { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
.cifra-month .m-fd { font-family: var(--font-mono); font-size: 10px; color: var(--info); }
.cifra-month .m-ae { font-family: var(--font-mono); font-size: 10px; color: var(--brand-yellow); }
.cifra-month .m-total { font-family: var(--font-mono); font-size: 11px; color: var(--text); font-weight: 600; padding-top: 3px; border-top: 1px solid var(--border); }

.cifra-meta-list { display: flex; flex-direction: column; gap: 4px; }
.cifra-meta-row {
  display: flex; justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px dashed var(--border);
  font-size: 11px;
}
.cifra-meta-row .k { color: var(--text-muted); font-family: var(--font-sans); }
.cifra-meta-row .v { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

/* Import banner */
.import-banner {
  padding: 8px 16px;
  background: rgba(62,200,160,0.08);
  border-bottom: 1px solid rgba(62,200,160,0.2);
  font-size: 11px; color: var(--good);
  display: flex; align-items: center; gap: 12px;
  font-family: var(--font-mono);
}

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--bg-panel); border: 1px solid var(--border-strong);
  border-radius: 14px; padding: 28px; width: 92%; max-width: 560px;
  display: flex; flex-direction: column; gap: 18px;
}
.modal h3 { font-size: 16px; font-family: var(--font-display); font-weight: 600; }
.dropzone {
  border: 2px dashed var(--border-strong); border-radius: 10px;
  padding: 40px 20px; text-align: center; cursor: pointer;
  background: var(--bg-elev); transition: all 0.2s;
}
.dropzone:hover, .dropzone.hover {
  border-color: var(--brand-yellow); background: rgba(240,208,32,0.04);
}
.dropzone-ico { font-size: 32px; margin-bottom: 8px; }
.dropzone-text { font-size: 13px; font-weight: 600; }
.dropzone-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-family: var(--font-mono); }

/* Responsive */
@media (max-width: 1200px) {
  .kpi-strip { grid-template-columns: repeat(3, 1fr); }
  .hero { grid-template-columns: 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
  .grid-3-2 { grid-template-columns: 1fr; }
}
@media (max-width: 720px) {
  .main { padding: 12px; }
  .app-header { padding: 12px 16px; }
  .kpi-strip { grid-template-columns: 1fr 1fr; }
  .hero-value { font-size: 36px; }
  .cifras-table { font-size: 10px; }
  .cifras-table td { padding: 6px 4px; }
}

/* Scrollbars */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-elev); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* Table wrap */
.table-wrap {
  overflow-x: auto;
  margin: 0 -20px;
  padding: 0 20px;
}

/* Accent-color override */
[data-accent="teal"] { --brand-yellow: #1a8fa6; }
[data-accent="amber"] { --brand-yellow: #f0a040; }
[data-accent="green"] { --brand-yellow: #3ec8a0; }

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;font-family:var(--font-sans);cursor:pointer;border:1px solid var(--border-strong);background:var(--bg-elev);color:var(--text);transition:all 0.15s;}
.btn:hover{background:var(--bg-panel-2);border-color:var(--brand-yellow);color:var(--brand-yellow);}
.btn.primary{background:var(--brand-yellow);color:#0a1420;border-color:var(--brand-yellow);font-weight:700;}
.chart-wrap{position:relative;height:220px;overflow:hidden;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:var(--dens-gap);}
.grid-3-2{display:grid;grid-template-columns:2fr 1fr;gap:var(--dens-gap);}
#importBanner{display:none;padding:7px 28px;background:rgba(62,200,160,0.07);border-bottom:1px solid rgba(62,200,160,0.18);font-size:11px;color:var(--good);align-items:center;gap:12px;font-family:var(--font-mono);}
</style>

function detectarEstrutura(hdr) {
  // Normaliza: trim + upper + colapsa espaços
  const h = hdr.map(v => (v||'').toString().trim().toUpperCase().replace(/\s+/g,' '));
  const col = name => h.indexOf(name.trim().toUpperCase().replace(/\s+/g,' '));

  // Detectar offset: Planura tem FAMÍLIA em col 0, Bom Despacho tem col extra em 0
  const iFAM = col('FAMÍLIA') >= 0 ? col('FAMÍLIA') : -1;
  if (iFAM < 0) return null;

  const off = iFAM; // offset de colunas (0 para Planura, 1 para Bom Despacho)

  // Meses disponíveis no cabeçalho
  const TODOS_MESES = ['OUT','NOV','DEZ','JAN','FEV','MAR','ABR','MAI','JUN'];
  const meses = TODOS_MESES.filter(m => h.some(v => v === 'REAL FD - '+m));

  // Montar índices de meses
  const mesIdx = {};
  meses.forEach(m => {
    mesIdx[m] = {
      fd:   h.indexOf('REAL FD - '+m),
      aevo: h.indexOf('REAL AEVO - '+m),
      proj: h.indexOf('PROJ - '+m)
    };
  });

  return {
    off,
    meses,
    mesIdx,
    iFAM,
    iDESC:  col('DESCRIÇÃO'),
    iORC:   col('ORÇADO'),
    iFD_T:  col('REAL FD - TOT'),
    iAE_T:  col('REAL AEVO - TOT'),
    iRPROV: col('REAL - PROVISIONADO'),
    iPROVT: col('PROV - TOT'),
    iREAL:  col('REAL - TOTAL'),
    iSALDO: col('SALDO') >= 0 ? col('SALDO') : col('REAL - SALDO'),
    iPROJ:  col('PROJETADO R$'),
    iSP:    col('SALDO PROJETADO $'),
  };
}

function csvToCifras(rows) {
  if(!rows || rows.length < 2) return [];

  // Detectar estrutura pelo cabeçalho
  const est = detectarEstrutura(rows[0]);
  if (!est) return [];

  const { meses, mesIdx, iFAM, iDESC, iORC, iFD_T, iAE_T,
          iRPROV, iPROVT, iREAL, iSALDO, iPROJ, iSP } = est;

  const familias = ['EQUIPAMENTO','MÃO DE OBRA','MATERIAL','SERVIÇO','TRANSPORTE'];
  const cifras = [];
  let lastFam = '';

  for(let i=1; i<rows.length; i++){
    const r = rows[i];
    if(!r || r.length < 5) continue;
    const fam  = (r[iFAM]||'').toString().trim().toUpperCase();
    const desc = (r[iDESC]||'').toString().trim();
    if(!desc) continue;
    if(desc.toUpperCase().includes('TOTAL GERAL')) continue;
    if(desc.toUpperCase() === 'DESCRIÇÃO') continue;

    if(familias.includes(fam)) lastFam = fam;
    const familia = lastFam;
    if(!familias.includes(familia)) continue;
    if(familias.includes(desc.toUpperCase())) continue;

    const ms = {};
    meses.forEach(m => {
      const {fd, aevo, proj} = mesIdx[m];
      const fv = fd   >= 0 ? n(r[fd])   : 0;
      const av = aevo >= 0 ? n(r[aevo]) : 0;
      const pv = proj >= 0 ? n(r[proj]) : 0;
      if(fv || av || pv) ms[m] = {fd:fv, aevo:av, proj:pv};
    });

    cifras.push({
      familia,
      descricao:  desc,
      orcado:     iORC   >= 0 ? n(r[iORC])   : 0,
      real_fd:    iFD_T  >= 0 ? n(r[iFD_T])  : 0,
      real_aevo:  iAE_T  >= 0 ? n(r[iAE_T])  : 0,
      real_prov:  iRPROV >= 0 ? n(r[iRPROV]) : 0,
      prov_tot:   iPROVT >= 0 ? n(r[iPROVT]) : 0,
      real_total: iREAL  >= 0 ? n(r[iREAL])  : 0,
      saldo:      iSALDO >= 0 ? n(r[iSALDO]) : 0,
      projetado:  iPROJ  >= 0 ? n(r[iPROJ])  : 0,
      saldo_proj: iSP    >= 0 ? n(r[iSP])    : 0,
      meses: ms
    });
  }
  return cifras;
}
let importObra = 'planura';

function abrirImport() {
  importObra = cObra;
  setImportObra(cObra);
  document.getElementById('importModal').style.display = 'flex';

function fecharImport() {

function setImportObra(o) {

function limparTodosOsDados() {

}

function limparDados() {

function handleFileDrop(e) {
  const file = e.dataTransfer.files[0];
  if (file) processarXlsx(file);
}

function handleFileSelect(input) {
  const file = input.files[0];
  if (file) processarXlsx(file);
  input.value = ''; // reset para permitir selecionar o mesmo arquivo novamente
}

function processarXlsx(file) {
  const status   = document.getElementById('importStatus');
  const dropName = document.getElementById('dropFileName');

  if (!/\.(xlsx|xlsm|xls)$/i.test(file.name)) {
    status.textContent = '⚠ Arquivo inválido. Use .xlsx ou .xlsm';
    status.style.color = 'var(--red)';
    return;
  }

  dropName.textContent = '⏳ Lendo ' + file.name + '...';
  status.textContent = '';

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb   = XLSX.read(data, { type: 'array', cellDates: true });

      // Abas possíveis por obra (tenta em ordem)
      const abasPossiveis  = ['P&R - TABELA', 'PXR_ABC ', 'PXR_ABC', 'PXR'];
      const relPossiveis   = ['P&R - RELATÓRIO', 'PXR_RELATORIO', 'PXR RELATORIO'];

      // Detectar aba de dados
      const abaName = abasPossiveis.find(a => wb.Sheets[a]) || null;
      if (!abaName) {
        status.textContent = '⚠ Nenhuma aba de dados encontrada. Abas: ' + wb.SheetNames.join(', ');
        status.style.color = 'var(--red)';
        dropName.textContent = '';
        return;
      }

      const ws   = wb.Sheets[abaName];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: true });
      const cifras = csvToCifras(rows);

      if (!cifras.length) {
        status.textContent = '⚠ Nenhuma cifra encontrada na aba ' + abaName;
        status.style.color = 'var(--red)';
        dropName.textContent = '';
        return;
      }

      // Totais: tentar aba de relatório, fallback = calcular das cifras
      let totais = calcTotais(cifras);
      const relName = relPossiveis.find(a => wb.Sheets[a]);
      if (relName) {
        const relRows = XLSX.utils.sheet_to_json(wb.Sheets[relName], { header:1, defval:'', raw:true });
        for (const row of relRows) {
          const label = (row[1]||'').toString().trim();
          if (label === 'Total Geral') {
            // Planura: [2]=orc [3]=real [4]=saldo [5]=prov [6]=proj [7]=saldoProj
            // BomDesp: [2]=orc [3]=proj [4]=saldoProj (estrutura diferente)
            // Detectar pelo valor: se row[3] ≈ soma real_total → Planura
            const somaReal = cifras.reduce((s,c)=>s+c.real_total,0);
            const v3 = n(row[3]);
            if (Math.abs(v3 - somaReal) / (somaReal||1) < 0.05) {
              // Planura layout
              totais = { orc:n(row[2]), real:n(row[3]), saldo:n(row[4]),
                         prov:n(row[5]), proj:n(row[6]), saldoProj:n(row[7]) };
            } else {
              // Bom Despacho layout: col3=proj, col4=saldoProj
              totais = { orc:n(row[2]), real:somaReal,
                         saldo: n(row[2]) - somaReal,
                         prov: cifras.reduce((s,c)=>s+(c.prov_tot||0),0),
                         proj: n(row[3]), saldoProj: n(row[4]) };
            }
            break;
          }
        }
      }

      // Atualizar memória + localStorage
      OBRAS[importObra].cifras = cifras;
      OBRAS[importObra].totais = totais;
      try {
        const ref = new Date().toLocaleDateString('pt-BR');
        localStorage.setItem('aevo_cifras_' + importObra, JSON.stringify(cifras));
        localStorage.setItem('aevo_totais_' + importObra, JSON.stringify(totais));
        localStorage.setItem('aevo_ref_'    + importObra, ref);
      } catch(err) {}

      if (importObra === cObra) render(cifras, totais);

      dropName.textContent = '✓ ' + file.name;
      status.textContent = `✓ ${cifras.length} cifras importadas de "${abaName}" — salvo no browser!`;
      status.style.color = 'var(--green)';
      setTimeout(() => fecharImport(), 2000);

    } catch(err) {
      status.textContent = '⚠ Erro: ' + err.message;
      status.style.color = 'var(--red)';
      dropName.textContent = '';
    }
  };
  reader.readAsArrayBuffer(file);
}

function calcTotais(cifras) {
  return {
    orc:       cifras.reduce((s,c)=>s+c.orcado,      0),
    real:      cifras.reduce((s,c)=>s+c.real_total,   0),
    saldo:     cifras.reduce((s,c)=>s+c.saldo,        0),
    prov:      cifras.reduce((s,c)=>s+(c.prov_tot||0),0),
    proj:      cifras.reduce((s,c)=>s+c.projetado,    0),
    saldoProj: cifras.reduce((s,c)=>s+(c.saldo_proj||0),0)
  };
}</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function Sparkline({ data, color = '#eaf2f8', w = 56, h = 18 }) {
  if (!data || !data.length) return null;
  const max = Math.max(...data, 1);
  const min = Math.min(...data, 0);
  const range = max - min || 1;
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return (
    <svg width={w} height={h} className="kpi-spark">
      <polyline points={points} fill="none" stroke={color} strokeWidth="1.2" />
      <circle cx={w} cy={h - ((data[data.length-1] - min) / range) * h} r="1.8" fill={color} />
    </svg>
  );
}
